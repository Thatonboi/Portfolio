      <stop offset="0%" stop-color="#0f2a22"/>
      <stop offset="100%" stop-color="#0f7a5c"/>
    </linearGradient>
    <radialGradient id="r" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#30D158" stop-opacity="0.55"/>
