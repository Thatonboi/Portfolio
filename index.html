<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Jordan Blake — Software Engineer</title>
<meta name="description" content="Engineering portfolio of Jordan Blake — software engineer.">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ambient background mesh -->
  <div class="bg-mesh" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
    <div class="bg-grain"></div>
  </div>

  <!-- ============================== TOP NAV ============================== -->
  <header class="topnav">
    <button class="brand" data-nav="home" id="brandBtn" aria-label="Home">JB</button>
    <nav class="topnav-links glass" aria-label="Primary">
      <button class="topnav-link" data-nav="home">Home</button>
      <button class="topnav-link" data-nav="portfolio">Portfolio</button>
      <button class="topnav-link topnav-link-cta" data-open="contact">Contact</button>
    </nav>
  </header>

  <!-- ============================= HOME SCREEN ============================= -->
  <main class="screen" id="screen-home" data-screen="home">
    <div class="screen-scroll">

      <!-- Hero / About split -->
      <section class="hero-split" id="hero">
        <div class="hero-split-text">
          <p class="eyebrow" id="personEyebrow">—</p>
          <h1 class="hero-headline" id="personHeadline">—</h1>
          <p class="hero-bio" id="aboutText">—</p>

          <div class="focus-list" id="focusList"></div>

          <div class="hero-actions">
            <a class="btn btn-primary" id="resumeBtn" href="#" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="none"><path d="M12 3v13m0 0-4-4m4 4 4-4M5 21h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Resume
            </a>
            <div class="hero-socials" id="heroSocials"></div>
          </div>
        </div>

        <div class="hero-split-media">
          <img class="hero-image" id="avatarImg" src="profile.svg" alt="Portrait">
          <div class="hero-chip glass" id="availabilityChip">
            <span class="hero-chip-dot"></span>
            <span id="availabilityText">—</span>
          </div>
        </div>
      </section>

      <!-- Experience -->
      <section class="section" id="experiencePanel">
        <h2 class="section-title">Experience</h2>
        <div class="timeline" id="timeline"></div>
      </section>

      <!-- Projects preview -->
      <section class="section" id="projectsPreviewPanel">
        <div class="section-head-row">
          <h2 class="section-title">Projects</h2>
          <button class="link-btn" data-nav="portfolio">
            See all
            <svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="project-grid project-grid-preview" id="projectsPreviewGrid"></div>
      </section>

    </div>
  </main>

  <!-- =========================== PORTFOLIO SCREEN =========================== -->
  <main class="screen" id="screen-portfolio" data-screen="portfolio">
    <div class="screen-scroll">
      <header class="screen-header">
        <h1>Portfolio</h1>
        <p>A selection of things I've designed, built, and shipped.</p>
      </header>
      <div class="project-grid" id="projectsFullGrid"></div>
    </div>
  </main>

  <!-- ============================ PROJECT OVERLAY ============================ -->
  <div class="sheet-backdrop" id="projectBackdrop" hidden></div>
  <div class="sheet project-sheet glass" id="projectSheet" role="dialog" aria-modal="true" aria-labelledby="projectSheetTitle" hidden>
    <div class="sheet-grabber" data-close="project"></div>
    <button class="sheet-close" data-close="project" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <div class="sheet-scroll">
      <div class="project-sheet-cover">
        <img id="projectSheetCover" src="" alt="">
      </div>
      <div class="project-sheet-body">
        <p class="project-sheet-category" id="projectSheetCategory">—</p>
        <h2 class="project-sheet-title" id="projectSheetTitle">—</h2>
        <p class="project-sheet-desc" id="projectSheetDesc">—</p>
        <div class="tag-row" id="projectSheetTags"></div>
        <div class="project-sheet-links" id="projectSheetLinks"></div>
        <div class="project-sheet-gallery" id="projectSheetGallery"></div>
      </div>
    </div>
  </div>

  <!-- ============================ CONTACT OVERLAY ============================ -->
  <div class="sheet-backdrop" id="contactBackdrop" hidden></div>
  <div class="sheet contact-sheet glass" id="contactSheet" role="dialog" aria-modal="true" aria-labelledby="contactSheetTitle" hidden>
    <div class="sheet-grabber" data-close="contact"></div>
    <button class="sheet-close" data-close="contact" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <div class="sheet-scroll contact-sheet-scroll">
      <h2 class="contact-title" id="contactSheetTitle">Let's talk</h2>
      <p class="contact-message" id="contactMessage">—</p>

      <div class="contact-list" id="contactList"></div>

      <div class="contact-socials" id="contactSocials"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
